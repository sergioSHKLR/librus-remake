<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="In God We Trust — founding seal">
  <rect width="640" height="200" fill="#f7f4f0"/>
  <rect x="0" y="0" width="6" height="200" fill="#c41e3a"/>
  <circle cx="110" cy="100" r="62" fill="none" stroke="#1a2a4a" stroke-width="3"/>
  <text x="110" y="92" text-anchor="middle" fill="#1a2a4a" font-family="Georgia, serif" font-size="11" font-weight="700">IN GOD</text>
  <text x="110" y="110" text-anchor="middle" fill="#1a2a4a" font-family="Georgia, serif" font-size="11" font-weight="700">WE TRUST</text>
  <text x="220" y="72" fill="#1a1a1a" font-family="Tahoma, sans-serif" font-size="18" font-weight="700">Founding Principles Carry Forward</text>
  <text x="220" y="102" fill="#444" font-family="system-ui, sans-serif" font-size="13">Liberty · Duty · Covenant · Perseverance</text>
  <text x="220" y="132" fill="#666" font-family="system-ui, sans-serif" font-size="12">Mars Colonial Authority acknowledges the spiritual and civic</text>
  <text x="220" y="152" fill="#666" font-family="system-ui, sans-serif" font-size="12">inheritance of the American founding — adapted, never abandoned.</text>
</svg>