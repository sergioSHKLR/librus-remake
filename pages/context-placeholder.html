<!DOCTYPE html>
<html lang="en-US" class="theme--light">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reference Lookup</title>
  <script>
    (function () {
      var theme = new URLSearchParams(location.search).get('theme');
      if (theme !== 'dark') theme = 'light';
      document.documentElement.className = 'theme--' + theme;
    })();
  </script>
  <style>
    /* Match --panel-context-bg from style.css SECTION 01 */
    html.theme--light {
      color-scheme: light;
      --bg-secondary: #ffffff;
      --text-muted: #5c636a;
      --panel-bg: var(--bg-secondary);
      --icon-muted: #9aa0a6;
    }

    html.theme--dark {
      color-scheme: dark;
      --bg-secondary: #1e1e1e;
      --text-muted: #b0b8bf;
      --panel-bg: var(--bg-secondary);
      --icon-muted: #6c757d;
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--panel-bg);
      font-family: system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      box-sizing: border-box;
    }

    .context-placeholder {
      text-align: center;
      max-width: 14rem;
    }

    .context-placeholder-icon.is-online {
      color: color-mix(in srgb, #1c7ed6 74%, var(--icon-muted) 26%);
    }

    .context-placeholder-icon.is-offline {
      color: color-mix(in srgb, #c92a2a 78%, var(--icon-muted) 22%);
    }

    html.theme--dark .context-placeholder-icon.is-online {
      color: color-mix(in srgb, #4dabf7 72%, var(--icon-muted) 28%);
    }

    html.theme--dark .context-placeholder-icon.is-offline {
      color: color-mix(in srgb, #fa5252 74%, var(--icon-muted) 26%);
    }

    .context-placeholder-text {
      margin: 0;
      font-size: 0.875rem;
      line-height: 1.55;
      color: var(--text-muted);
    }
  </style>
</head>

<body>
  <div class="context-placeholder">
    <!-- Fixed duplicate alt tag here -->
    <img id="context-placeholder-icon" src="../icons/online-color.svg" alt="Online" aria-hidden="true"
      class="context-placeholder-icon is-online" width="48" height="48">

    <p class="context-placeholder-text" id="context-placeholder-text">
      Select text in the book, then choose a lookup provider above.
    </p>
  </div>

  <script>
    (function () {
      var TEXT_ONLINE = 'Select text in the book, then choose a lookup provider above.';
      var TEXT_OFFLINE = 'You’re offline. This panel is unavailable';

      function applyConnectivityState(isOnline) {
        var icon = document.getElementById('context-placeholder-icon');
        var textEl = document.getElementById('context-placeholder-text');

        if (icon) {
          icon.src = isOnline ? '../icons/online-color.svg' : '../icons/offline-color.svg'; icon.classList.toggle('is-online', isOnline);
          icon.classList.toggle('is-offline', !isOnline);
        }
        if (textEl) textEl.textContent = isOnline ? TEXT_ONLINE : TEXT_OFFLINE;
      }

      var params = new URLSearchParams(location.search);
      var onlineParam = params.get('online');

      var initialOnline = navigator.onLine;
      if (onlineParam === '0') initialOnline = false;
      if (onlineParam === '1') initialOnline = true;

      applyConnectivityState(initialOnline);

      window.addEventListener('online', function () { applyConnectivityState(true); });
      window.addEventListener('offline', function () { applyConnectivityState(false); });
      window.addEventListener('message', function (e) {
        if (e.origin !== location.origin) return;
        if (e.data && e.data.type === 'librus:connectivity') {
          var messageState = e.data.online === false ? false : !!e.data.online;
          applyConnectivityState(messageState);
        }
      });
    })(); // Added missing closing wrapper here to fix syntax error
  </script>
</body>

</html>
