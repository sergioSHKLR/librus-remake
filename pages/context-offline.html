<!DOCTYPE html>
<html lang="en-US" class="theme--system">

<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Offline reference</title>
 <script src="context-theme.js"></script>
 <link rel="stylesheet" href="context-theme.css">
 <style>
  html,
  body {
   height: 100%;
   margin: 0;
  }

  body {
   background: var(--panel-bg);
   color: var(--text-primary);
   font-family: system-ui, -apple-system, sans-serif;
   font-size: 0.875rem;
   line-height: 1.5;
  }

  .offline-ref {
   display: flex;
   flex-direction: column;
   height: 100%;
   min-height: 0;
  }

  .offline-ref-header {
   flex-shrink: 0;
   padding: 1rem 1rem 0.75rem;
   text-align: center;
   border-bottom: 0.0625rem solid var(--border-color);
  }

  .offline-ref-title {
   margin: 0.5rem 0 0;
   font-size: 0.9375rem;
   font-weight: 600;
  }

  .offline-ref-subtitle {
   margin: 0.25rem 0 0;
   font-size: 0.8125rem;
   color: var(--text-muted);
  }

  .offline-ref-query {
   margin: 0.5rem 0 0;
   font-size: 0.8125rem;
   color: var(--text-muted);
  }

  .offline-ref-query strong {
   color: var(--text-primary);
   font-weight: 600;
  }

  .offline-ref-body {
   flex: 1 1 auto;
   min-height: 0;
   overflow-y: auto;
   padding: 0.75rem 1rem 1rem;
   -webkit-overflow-scrolling: touch;
  }

  .offline-ref-status {
   margin: 0;
   color: var(--text-muted);
   font-size: 0.8125rem;
  }

  .offline-ref-list {
   list-style: none;
   margin: 0.75rem 0 0;
   padding: 0;
   display: flex;
   flex-direction: column;
   gap: 0.5rem;
  }

  .offline-ref-hit {
   width: 100%;
   text-align: left;
   padding: 0.625rem 0.75rem;
   border: 0.0625rem solid var(--border-color);
   border-radius: 0.375rem;
   background: transparent;
   color: var(--text-primary);
   font: inherit;
   cursor: pointer;
   transition: background 0.15s ease, border-color 0.15s ease;
  }

  .offline-ref-hit:hover {
   background: color-mix(in srgb, var(--accent) 10%, transparent);
   border-color: color-mix(in srgb, var(--accent) 35%, var(--border-color) 65%);
  }

  .offline-ref-hit-snippet {
   display: block;
   line-height: 1.45;
  }

  .icon {
   display: block;
   color: var(--text-muted);
  }

  .context-offline-icon {
   width: 3rem;
   height: 3rem;
   margin: 0 auto;
  }
 </style>
</head>

<body>

 <div class="offline-ref">
  <header class="offline-ref-header">
  <div class="offline-ref-icon" aria-hidden="true">
  <svg class="icon context-offline-icon" aria-hidden="true"><use href="../icons/sprite.svg#wifi-off"/></svg>
</div>
   <p class="offline-ref-title" id="offline-ref-title">Offline — search in this book</p>
   <p class="offline-ref-subtitle" id="offline-ref-subtitle">No network. Showing passages from the open book.</p>
   <p class="offline-ref-query" id="offline-ref-query" hidden></p>
  </header>
  <div class="offline-ref-body">
   <p class="offline-ref-status" id="offline-ref-status">Searching…</p>
   <ul class="offline-ref-list" id="offline-ref-list" hidden></ul>
  </div>
 </div>
 <script>
  (function () {
   var params = new URLSearchParams(location.search);
   var provider = params.get('provider') || 'wiki';
   var query = (params.get('q') || '').trim();
   var titleEl = document.getElementById('offline-ref-title');
   var subtitleEl = document.getElementById('offline-ref-subtitle');
   var queryEl = document.getElementById('offline-ref-query');
   var statusEl = document.getElementById('offline-ref-status');
   var listEl = document.getElementById('offline-ref-list');

   var providerCopy = {
    wiki: { title: 'Offline encyclopaedia — in this book', subtitle: 'Search the open book for related passages.' },
    dictionary: { title: 'Offline dictionary — in this book', subtitle: 'Search the open book for uses of this term.' }
   };
   var copy = providerCopy[provider] || providerCopy.wiki;
   if (titleEl) titleEl.textContent = copy.title;
   if (subtitleEl) subtitleEl.textContent = copy.subtitle;
   if (queryEl) {
    if (query) {
     queryEl.hidden = false;
     queryEl.innerHTML = 'Looking for <strong>\u201C' + escapeHtml(query) + '\u201D</strong>';
    } else {
     queryEl.hidden = true;
    }
   }

   function escapeHtml(str) {
    return String(str || '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
   }

   function renderResults(hits) {
    if (!statusEl || !listEl) return;
    if (!hits || !hits.length) {
     statusEl.textContent = query
      ? 'No passages in this book match that term.'
      : 'Select text in the book, then choose a lookup provider.';
     listEl.hidden = true;
     listEl.innerHTML = '';
     return;
    }
    statusEl.textContent = hits.length === 1 ? '1 passage found' : hits.length + ' passages found';
    listEl.hidden = false;
    listEl.innerHTML = '';
    hits.forEach(function (hit, index) {
     var btn = document.createElement('button');
     btn.type = 'button';
     btn.className = 'offline-ref-hit';
     var snippet = document.createElement('span');
     snippet.className = 'offline-ref-hit-snippet';
     snippet.textContent = hit.snippet || '';
     btn.appendChild(snippet);
     btn.addEventListener('click', function () {
      if (window.parent && window.parent !== window) {
       window.parent.postMessage({
        type: 'librus:offline-goto',
        sectionId: hit.sectionId || '',
        query: query,
        hitIndex: index
       }, location.origin);
      }
     });
     listEl.appendChild(btn);
    });
   }

   function requestLookup() {
    if (!window.parent || window.parent === window) {
     if (statusEl) statusEl.textContent = 'Open a book in Librus to search offline.';
     return;
    }
    window.parent.postMessage({
     type: 'librus:offline-lookup',
     provider: provider,
     query: query
    }, location.origin);
   }

   window.addEventListener('message', function (e) {
    if (e.origin !== location.origin) return;
    if (!e.data || e.data.type !== 'librus:offline-lookup-results') return;
    renderResults(e.data.hits || []);
   });

   requestLookup();
  })();
 </script>
</body>

</html>
