<!DOCTYPE html>
<html lang="en-US" class="theme--system">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Viewer</title>
  <script src="context-theme.js"></script>
  <link rel="stylesheet" href="context-theme.css">
  <style>
    html.theme--light,
    html.theme--system {
      --bg: var(--panel-bg);
      --toolbar-bg: color-mix(in srgb, var(--panel-bg) 70%, #ffffff);
      --text: var(--text-primary);
      --border: var(--border-color);
      --btn-bg: color-mix(in srgb, var(--panel-bg) 55%, #ffffff);
      --btn-hover: color-mix(in srgb, var(--panel-bg) 40%, #ffffff);
    }

    html.theme--dark {
      --bg: var(--panel-bg);
      --toolbar-bg: color-mix(in srgb, var(--panel-bg) 80%, #000000);
      --text: var(--text-primary);
      --border: var(--border-color);
      --btn-bg: color-mix(in srgb, var(--panel-bg) 70%, #000000);
      --btn-hover: color-mix(in srgb, var(--panel-bg) 55%, #000000);
    }

    @media (prefers-color-scheme: light) {
      html.theme--system {
        --bg: var(--panel-bg);
        --toolbar-bg: color-mix(in srgb, var(--panel-bg) 70%, #ffffff);
        --text: var(--text-primary);
        --border: var(--border-color);
        --btn-bg: color-mix(in srgb, var(--panel-bg) 55%, #ffffff);
        --btn-hover: color-mix(in srgb, var(--panel-bg) 40%, #ffffff);
      }
    }

    @media (prefers-color-scheme: dark) {
      html.theme--system {
        --bg: var(--panel-bg);
        --toolbar-bg: color-mix(in srgb, var(--panel-bg) 80%, #000000);
        --text: var(--text-primary);
        --border: var(--border-color);
        --btn-bg: color-mix(in srgb, var(--panel-bg) 70%, #000000);
        --btn-hover: color-mix(in srgb, var(--panel-bg) 55%, #000000);
      }
    }

    html,
    body {
      height: 100%;
      margin: 0;
    }

    body {
      display: flex;
      flex-direction: column;
      background: var(--bg);
      font-family: system-ui, -apple-system, sans-serif;
      color: var(--text);
    }

    .pdf-toolbar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--toolbar-bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .pdf-toolbar button {
      border: 1px solid var(--border);
      background: var(--btn-bg);
      color: var(--text);
      border-radius: 0.375rem;
      padding: 0.35rem 0.75rem;
      font-size: 0.8125rem;
      cursor: pointer;
    }

    .pdf-toolbar button:hover {
      background: var(--btn-hover);
    }

    .pdf-toolbar-hint {
      font-size: 0.75rem;
      opacity: 0.75;
      margin: 0;
      flex: 1;
      min-width: 0;
    }

    .pdf-stage {
      flex: 1;
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      box-sizing: border-box;
    }

    .pdf-empty {
      text-align: center;
      max-width: 14rem;
      font-size: 0.875rem;
      line-height: 1.55;
      opacity: 0.8;
    }

    .pdf-frame {
      width: 100%;
      height: 100%;
      border: 0;
      display: none;
      background: #fff;
    }

    .pdf-frame.is-active {
      display: block;
    }

    #pdf-file-input {
      display: none;
    }
  </style>
</head>

<body>
  <div class="pdf-toolbar">
    <button type="button" id="pdf-open-btn">Open PDF…</button>
    <p class="pdf-toolbar-hint" id="pdf-toolbar-hint">Offline mode — open a PDF from this device.</p>
    <input type="file" id="pdf-file-input" accept="application/pdf,.pdf">
  </div>
  <div class="pdf-stage">
    <p class="pdf-empty" id="pdf-empty">No PDF loaded. Use <strong>Open PDF</strong> to view a file from your device.</p>
    <embed class="pdf-frame" id="pdf-frame" type="application/pdf" title="PDF document">
  </div>
  <script>
    (function () {
      var openBtn = document.getElementById('pdf-open-btn');
      var fileInput = document.getElementById('pdf-file-input');
      var frame = document.getElementById('pdf-frame');
      var emptyEl = document.getElementById('pdf-empty');
      var hintEl = document.getElementById('pdf-toolbar-hint');
      var currentBlobUrl = '';

      function revokeBlob() {
        if (currentBlobUrl) {
          URL.revokeObjectURL(currentBlobUrl);
          currentBlobUrl = '';
        }
      }

      function showPdf(blobUrl, label) {
        revokeBlob();
        currentBlobUrl = blobUrl;
        frame.src = blobUrl;
        frame.classList.add('is-active');
        if (emptyEl) emptyEl.hidden = true;
        if (hintEl && label) hintEl.textContent = label;
      }

      function clearPdf() {
        revokeBlob();
        frame.removeAttribute('src');
        frame.classList.remove('is-active');
        if (emptyEl) emptyEl.hidden = false;
        if (hintEl) hintEl.textContent = 'Offline mode — open a PDF from this device.';
      }

      function openFilePicker() {
        if (fileInput) fileInput.click();
      }

      if (openBtn) openBtn.addEventListener('click', openFilePicker);

      if (fileInput) {
        fileInput.addEventListener('change', function () {
          var file = fileInput.files && fileInput.files[0];
          fileInput.value = '';
          if (!file) return;
          showPdf(URL.createObjectURL(file), file.name);
        });
      }

      window.addEventListener('message', function (e) {
        if (e.origin !== location.origin) return;
        if (!e.data) return;
        if (e.data.type === 'librus:pdf-open') openFilePicker();
        if (e.data.type === 'librus:pdf-clear') clearPdf();
      });

      window.addEventListener('pagehide', revokeBlob);
    })();
  </script>
</body>

</html>
